<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Network Ops · Login & Sign-up</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ... (keep all existing styles the same) ... */
        :root {
            --color-primary: #1018D8;
            --color-dark-bg: #000000;
            --color-light-gray: #D9D9D9;
            --color-white: #FFFFFF;
            --color-dark-text: #1A1A1A;
            --color-error: #c0152f;
            --color-success: #0fa4a4;
            --color-warning: #f59e0b;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--color-dark-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 56px 56px;
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 70%);
            mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: var(--color-primary);
            border-radius: 50%;
            opacity: 0;
            animation: float-up 8s infinite;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--color-white);
            border-radius: 20px;
            padding: 40px 32px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: slide-up 0.6s ease;
            transition: padding 0.2s;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-mark {
            width: 48px;
            height: 48px;
            background: var(--color-primary);
            display: inline-block;
            transform: rotate(45deg);
            margin-bottom: 16px;
            border-radius: 8px;
        }

        .brand-name {
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-dark-text);
            margin-bottom: 4px;
        }

        .welcome-text {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 700;
            color: var(--color-dark-text);
            margin-bottom: 4px;
        }

        .subtitle-text {
            font-size: 14px;
            color: #666666;
        }

        .auth-tabs {
            display: flex;
            background: #f0f0f0;
            border-radius: 40px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-weight: 600;
            font-size: 15px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s;
            color: #666;
            background: transparent;
            border: none;
            font-family: var(--font-body);
        }

        .auth-tab.active {
            background: var(--color-primary);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 24, 216, 0.25);
        }

        .auth-tab:not(.active):hover {
            background: rgba(16, 24, 216, 0.06);
            color: var(--color-dark-text);
        }

        .form-panel {
            display: block;
            transition: opacity 0.2s;
        }

        .form-panel.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-dark-text);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 15px;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px 13px 44px;
            border: 2px solid var(--color-light-gray);
            border-radius: 12px;
            font-size: 15px;
            font-family: var(--font-body);
            color: var(--color-dark-text);
            background: #fafafa;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--color-primary);
            background: var(--color-white);
            box-shadow: 0 0 0 4px rgba(16, 24, 216, 0.08);
        }

        .input-wrapper:focus-within .icon {
            color: var(--color-primary);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 18px;
            padding: 4px;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: var(--color-primary);
        }

        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--color-primary);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .forgot-link:hover {
            color: #0B13B0;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }

        .login-btn:hover {
            background: #0B13B0;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 24, 216, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-btn .spinner-btn {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .login-btn.loading .spinner-btn {
            display: inline-block;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee2e2;
            color: var(--color-error);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
            border-left: 4px solid var(--color-error);
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #e0f7f7;
            color: var(--color-success);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
            border-left: 4px solid var(--color-success);
            animation: fadeIn 0.4s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-family: var(--font-mono);
            letter-spacing: 0.05em;
        }

        .login-footer a {
            color: var(--color-warning);
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 18px;
                border-radius: 16px;
            }
            .welcome-text {
                font-size: 22px;
            }
            .auth-tab {
                font-size: 14px;
                padding: 8px 0;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="login-wrapper">
        <div class="login-card" id="loginCard">
            <div class="brand-header">
                <div class="brand-mark"></div>
                <div class="brand-name">SCND Portal</div>
                <div class="welcome-text" id="panelTitle">Welcome back</div>
                <p class="subtitle-text" id="panelSub">Sign in to access your supply chain tools</p>
            </div>

            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" data-tab="login" id="tabLogin">Sign in</button>
                <button class="auth-tab" data-tab="signup" id="tabSignup">Create account</button>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Account created!</span>
            </div>

            <!-- LOGIN PANEL -->
            <div class="form-panel" id="loginPanel">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope icon"></i>
                            <input type="email" id="loginEmail" placeholder="you@company.com" required autocomplete="email" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock icon"></i>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password" />
                            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword','toggleLoginIcon')" title="Show password">
                                <i class="fas fa-eye" id="toggleLoginIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="options-row">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe" />
                            <span>Remember me</span>
                        </label>
                        <button type="button" class="forgot-link" onclick="forgotPassword()">Forgot password?</button>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <div class="spinner-btn"></div>
                    </button>
                </form>
            </div>

            <!-- SIGNUP PANEL -->
            <div class="form-panel hidden" id="signupPanel">
                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>Full name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user icon"></i>
                            <input type="text" id="signupName" placeholder="John Doe" required autocomplete="name" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope icon"></i>
                            <input type="email" id="signupEmail" placeholder="you@company.com" required autocomplete="email" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock icon"></i>
                            <input type="password" id="signupPassword" placeholder="Min 8 characters" required autocomplete="new-password" />
                            <button type="button" class="password-toggle" onclick="togglePassword('signupPassword','toggleSignupIcon')" title="Show password">
                                <i class="fas fa-eye" id="toggleSignupIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-check-circle icon"></i>
                            <input type="password" id="signupConfirm" placeholder="Re-enter password" required autocomplete="off" />
                        </div>
                    </div>

                    <button type="submit" class="login-btn" id="signupBtn">
                        <span class="btn-text">Create account</span>
                        <div class="spinner-btn"></div>
                    </button>
                </form>
            </div>
        </div>

        <div class="login-footer">
            Network Ops &copy; 2026 &nbsp;|&nbsp;
            <a href="#" onclick="contactSupport()">Contact Support</a>
        </div>
    </div>

    <script>
        // ============ PARTICLES ============
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#1018D8', '#f59e0b', '#0fa4a4', '#c0152f'];
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 4 + 2;
                const color = colors[Math.floor(Math.random() * colors.length)];
                p.style.cssText = `
                    width: ${size}px; height: ${size}px;
                    left: ${Math.random() * 100}%;
                    background: ${color};
                    animation-delay: ${Math.random() * 8}s;
                    animation-duration: ${Math.random() * 6 + 6}s;
                `;
                container.appendChild(p);
            }
        }

        // ============ TOGGLE PASSWORD ============
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ============ UI HELPERS ============
        function showError(msg) {
            const el = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = msg;
            el.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMessage');
            document.getElementById('successText').textContent = msg;
            el.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        function hideAllMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ============ USER DATABASE (Local Storage) ============
        function getUsers() {
            const users = localStorage.getItem('networkOps_users');
            return users ? JSON.parse(users) : {};
        }

        function saveUsers(users) {
            localStorage.setItem('networkOps_users', JSON.stringify(users));
        }

        // Add default admin account if none exist
        function initializeDefaultUsers() {
            const users = getUsers();
            if (!users['admin@Rhenus.com']) {
                users['admin@Rhenus.com'] = {
                    name: 'Admin',
                    password: 'Rhenuswhsolutions',
                    created: new Date().toISOString()
                };
                saveUsers(users);
            }
        }

        // ============ TAB SWITCHING ============
        function switchTab(tab) {
            const loginPanel = document.getElementById('loginPanel');
            const signupPanel = document.getElementById('signupPanel');
            const tabLogin = document.getElementById('tabLogin');
            const tabSignup = document.getElementById('tabSignup');
            const title = document.getElementById('panelTitle');
            const sub = document.getElementById('panelSub');

            hideAllMessages();

            if (tab === 'login') {
                loginPanel.classList.remove('hidden');
                signupPanel.classList.add('hidden');
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                title.textContent = 'Welcome back';
                sub.textContent = 'Sign in to access your supply chain tools';
                document.getElementById('loginEmail').focus();
            } else {
                loginPanel.classList.add('hidden');
                signupPanel.classList.remove('hidden');
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                title.textContent = 'Join Network Ops';
                sub.textContent = 'Create your account and get started';
                document.getElementById('signupName').focus();
            }
        }

        document.getElementById('tabLogin').addEventListener('click', () => switchTab('login'));
        document.getElementById('tabSignup').addEventListener('click', () => switchTab('signup'));

        // ============ LOGIN HANDLER (with saved users) ============
        function handleLogin(e) {
            e.preventDefault();
            hideAllMessages();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) { showError('Please enter both email and password'); return; }
            if (!isValidEmail(email)) { showError('Please enter a valid email address'); return; }

            btn.classList.add('loading');
            btn.disabled = true;

            setTimeout(() => {
                const users = getUsers();
                
                // Check if user exists and password matches
                if (users[email] && users[email].password === password) {
                    const authData = { 
                        email, 
                        name: users[email].name,
                        loginTime: new Date().toISOString(), 
                        rememberMe 
                    };
                    if (rememberMe) {
                        localStorage.setItem('networkOps_auth', JSON.stringify(authData));
                    } else {
                        sessionStorage.setItem('networkOps_auth', JSON.stringify(authData));
                    }
                    window.location.href = 'dashboard.html';
                } else {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    showError('Invalid email or password. Please try again.');
                    document.querySelector('.login-card').style.animation = 'none';
                    document.querySelector('.login-card').offsetHeight;
                    document.querySelector('.login-card').style.animation = 'shake 0.5s ease';
                }
            }, 1500);
        }

        // ============ SIGNUP HANDLER (saves to localStorage) ============
        function handleSignup(e) {
            e.preventDefault();
            hideAllMessages();

            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;
            const btn = document.getElementById('signupBtn');

            if (!name || !email || !password || !confirm) {
                showError('Please fill in all fields');
                return;
            }
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }
            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            // Check if user already exists
            const users = getUsers();
            if (users[email]) {
                showError('This email is already registered. Please sign in.');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            setTimeout(() => {
                // Save the new user
                users[email] = {
                    name: name,
                    password: password,
                    created: new Date().toISOString()
                };
                saveUsers(users);

                btn.classList.remove('loading');
                btn.disabled = false;

                showSuccess('Account created successfully! Redirecting...');
                
                // Auto-login after signup
                setTimeout(() => {
                    const authData = { 
                        email, 
                        name: name,
                        loginTime: new Date().toISOString(), 
                        rememberMe: false 
                    };
                    sessionStorage.setItem('networkOps_auth', JSON.stringify(authData));
                    window.location.href = 'dashboard.html';
                }, 1200);
            }, 1600);
        }

        // ============ FORGOT PASSWORD ============
        function forgotPassword() {
            const email = document.getElementById('loginEmail').value.trim();
            const users = getUsers();
            
            if (email && isValidEmail(email)) {
                if (users[email]) {
                    alert(`✅ Password reset link would be sent to:\n${email}\n\n(For demo purposes, your password is: ${users[email].password})`);
                } else {
                    alert(`❌ No account found with email: ${email}\n\nPlease check your email or create a new account.`);
                }
            } else {
                alert('Please enter your email address first, then click "Forgot password?"');
            }
        }

        // ============ CONTACT SUPPORT ============
        function contactSupport() {
            alert('📧 Contact Support:\n\nEmail: support@networkops.com\nPhone: +91 12345 67890\n\nHours: Mon-Fri, 9 AM - 6 PM IST');
        }

        // ============ CHECK EXISTING AUTH ============
        function checkExistingAuth() {
            const local = localStorage.getItem('networkOps_auth');
            const session = sessionStorage.getItem('networkOps_auth');
            const raw = local || session;
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    const diff = (new Date() - new Date(data.loginTime)) / (1000 * 60 * 60);
                    if (diff < 24) {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                } catch (_) { /* ignore */ }
                localStorage.removeItem('networkOps_auth');
                sessionStorage.removeItem('networkOps_auth');
            }
        }

        // ============ INIT ============
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            initializeDefaultUsers(); // Creates default admin account
            checkExistingAuth();

            document.getElementById('loginEmail').focus();

            document.querySelectorAll('#loginForm input, #signupForm input').forEach(inp => {
                inp.addEventListener('input', hideAllMessages);
            });

            document.getElementById('signupForm').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('signupForm').dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
