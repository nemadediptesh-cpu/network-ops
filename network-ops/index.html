<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Ops — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1018D8;
            --color-dark-bg: #000000;
            --color-light-gray: #D9D9D9;
            --color-white: #FFFFFF;
            --color-dark-text: #1A1A1A;
            --color-error: #c0152f;
            --color-success: #0fa4a4;
            --color-warning: #f59e0b;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--color-dark-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background grid */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 56px 56px;
            -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 70%);
            mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Animated particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: var(--color-primary);
            border-radius: 50%;
            opacity: 0;
            animation: float-up 8s infinite;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* Login container */
        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--color-white);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: slide-up 0.6s ease;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-mark {
            width: 48px;
            height: 48px;
            background: var(--color-primary);
            display: inline-block;
            transform: rotate(45deg);
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .brand-name {
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-dark-text);
            margin-bottom: 8px;
        }

        .welcome-text {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--color-dark-text);
            margin-bottom: 6px;
        }

        .subtitle-text {
            font-size: 14px;
            color: #666666;
        }

        /* Form styles */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 600;
            color: var(--color-dark-text);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid var(--color-light-gray);
            border-radius: 12px;
            font-size: 15px;
            font-family: var(--font-body);
            color: var(--color-dark-text);
            background: #fafafa;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--color-primary);
            background: var(--color-white);
            box-shadow: 0 0 0 4px rgba(16,24,216,0.08);
        }

        .form-group input:focus + .icon,
        .input-wrapper:focus-within .icon {
            color: var(--color-primary);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        /* Password toggle */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 18px;
            padding: 4px;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: var(--color-primary);
        }

        /* Options row */
        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--color-primary);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #0B13B0;
            text-decoration: underline;
        }

        /* Login button */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: #0B13B0;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16,24,216,0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error message */
        .error-message {
            background: #fee2e2;
            color: var(--color-error);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid var(--color-error);
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Loading spinner */
        .spinner-btn {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .login-btn.loading .spinner-btn {
            display: inline-block;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            font-family: var(--font-mono);
            letter-spacing: 0.05em;
        }

        .login-footer a {
            color: var(--color-warning);
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border-radius: 16px;
            }

            .welcome-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="particles" id="particles"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- Brand -->
            <div class="brand-header">
                <div class="brand-mark"></div>
                <div class="brand-name">SCND Portal</div>
                <div class="welcome-text">Welcome back</div>
                <p class="subtitle-text">Sign in to access your supply chain tools</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope icon"></i>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="you@company.com" 
                            required 
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter your password" 
                            required 
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword()" title="Show password">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner-btn"></div>
                </button>
            </form>
        </div>

        <div class="login-footer">
            Network Ops &copy; 2026 &nbsp;|&nbsp; 
            <a href="#" onclick="contactSupport()">Contact Support</a>
        </div>
    </div>

    <script>
        // ============ CREATE FLOATING PARTICLES ============
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#1018D8', '#f59e0b', '#0fa4a4', '#c0152f'];
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 4 + 2;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${Math.random() * 100}%;
                    background: ${color};
                    animation-delay: ${Math.random() * 8}s;
                    animation-duration: ${Math.random() * 6 + 6}s;
                `;
                
                container.appendChild(particle);
            }
        }

        // ============ TOGGLE PASSWORD VISIBILITY ============
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'fas fa-eye';
            }
        }

        // ============ SHOW ERROR ============
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.add('show');
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        // ============ HANDLE LOGIN ============
        function handleLogin(event) {
            event.preventDefault();
            hideError();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            // Basic validation
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            // Simulate authentication (replace with real auth)
            setTimeout(() => {
                // ====================================================
                // DEFAULT CREDENTIALS (change these for production!)
                // ====================================================
                const VALID_EMAIL = 'admin@networkops.com';
                const VALID_PASSWORD = 'NetworkOps2026!';
                
                if (email === VALID_EMAIL && password === VALID_PASSWORD) {
                    // Store auth state
                    const authData = {
                        email: email,
                        loginTime: new Date().toISOString(),
                        rememberMe: rememberMe
                    };
                    
                    if (rememberMe) {
                        localStorage.setItem('networkOps_auth', JSON.stringify(authData));
                    } else {
                        sessionStorage.setItem('networkOps_auth', JSON.stringify(authData));
                    }
                    
                    // Redirect to tools landing page
                    window.location.href = 'dashboard.html';
                } else {
                    // Failed login
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    showError('Invalid email or password. Please try again.');
                    
                    // Shake the card
                    const card = document.querySelector('.login-card');
                    card.style.animation = 'none';
                    card.offsetHeight; // Trigger reflow
                    card.style.animation = 'shake 0.5s ease';
                }
            }, 1500); // Simulate network delay
        }

        // ============ EMAIL VALIDATION ============
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // ============ FORGOT PASSWORD ============
        function forgotPassword() {
            const email = document.getElementById('email').value.trim();
            
            if (email && isValidEmail(email)) {
                alert(`✅ Password reset link would be sent to:\n${email}\n\n(This is a demo - no email is actually sent)`);
            } else {
                alert('Please enter your email address first, then click "Forgot password?"');
            }
        }

        // ============ CONTACT SUPPORT ============
        function contactSupport() {
            alert('📧 Contact Support:\n\nEmail: support@networkops.com\nPhone: +91 12345 67890\n\nHours: Mon-Fri, 9 AM - 6 PM IST');
        }

        // ============ CHECK EXISTING AUTH ============
        function checkExistingAuth() {
            const localAuth = localStorage.getItem('networkOps_auth');
            const sessionAuth = sessionStorage.getItem('networkOps_auth');
            
            if (localAuth || sessionAuth) {
                try {
                    const authData = JSON.parse(localAuth || sessionAuth);
                    // Check if auth is less than 24 hours old
                    const loginTime = new Date(authData.loginTime);
                    const now = new Date();
                    const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
                    
                    if (hoursDiff < 24) {
                        // Still valid, redirect to dashboard
                        window.location.href = 'dashboard.html';
                        return;
                    }
                } catch (e) {
                    // Invalid auth data, clear it
                    localStorage.removeItem('networkOps_auth');
                    sessionStorage.removeItem('networkOps_auth');
                }
            }
        }

        // ============ INITIALIZATION ============
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            checkExistingAuth();
            
            // Focus on email input
            document.getElementById('email').focus();
            
            // Hide error on input
            document.getElementById('email').addEventListener('input', hideError);
            document.getElementById('password').addEventListener('input', hideError);
            
            // Handle Enter key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
